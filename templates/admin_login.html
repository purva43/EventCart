<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 40px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      border: 1px solid #e6e9ef;
    }

    .login-title {
      font-size: 22px;
      font-weight: 600;
      color: #2c3e50;
      text-align: center;
      margin-bottom: 30px;
    }

    .form-label {
      font-size: 14px;
      font-weight: 500;
      color: #495057;
      margin-bottom: 6px;
    }

    .form-control {
      height: 45px;
      border-radius: 6px;
      border: 1px solid #ced4da;
      font-size: 14px;
      padding: 10px 12px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .form-control:focus {
      border-color: #0d6efd;
      box-shadow: 0 0 0 3px rgba(13,110,253,0.1);
    }

    .btn-login {
      height: 45px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 6px;
      background-color: #0d6efd;
      border: none;
      transition: background-color 0.2s ease;
    }

    .btn-login:hover {
      background-color: #0b5ed7;
    }

    .alert {
      font-size: 14px;
      border-radius: 6px;
    }

    .muted-text {
      font-size: 13px;
      color: #6c757d;
      text-align: center;
      margin-top: 18px;
    }

    .back-link {
      text-align: center;
      margin-top: 15px;
    }

    .back-link a {
      font-size: 14px;
      color: #0d6efd;
      text-decoration: none;
    }

    .back-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .login-wrapper {
        margin: 20px;
        padding: 30px 20px;
      }
    }
  </style>
</head>

<body>

  <div class="login-wrapper">
    <h4 class="login-title">Admin Login</h4>

    {% if messages %}
      {% for m in messages %}
        <div class="alert alert-danger">{{ m }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" name="username" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" name="password" required>
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-login">Login</button>
      </div>
    </form>

    <p class="muted-text">Default: admin / admin123</p>

    <div class="back-link">
      <a href="{% url 'home' %}">Back to site</a>
    </div>
  </div>

</body>
</html>
