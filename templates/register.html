{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card p-4">
      <h3 class="mb-3"><strong style="color: #6052d8;"><center>Create your account</center></strong></h3>
      {% if messages %}
        <div class="mb-3">
          {% for m in messages %}
            <div class="alert alert-danger">{{ m }}</div>
          {% endfor %}
        </div>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label for="username" class="form-label"><strong style="font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif; font-size: 20px; color: #6052d8;">Username</strong></label>
          <input type="text" class="form-control" id="username" name="username" placeholder="Enter Username" required>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label"><strong style="font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif; font-size: 20px; color: #6052d8;">Email Address</strong></label>
          <input type="email" class="form-control" id="email" name="email" placeholder="Enter Email Address" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label"><strong style="font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif; font-size: 20px; color: #6052d8;">Password</strong></label>
          <input type="password" class="form-control" id="password" name="password" placeholder="Enter Password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Create account</button>
      </form>
      <center><p class="small-muted mt-3">Already have an account? <a href="{% url 'user_login' %}">Login</a></p></center>
    </div>
  </div>
</div>
{% endblock %}
