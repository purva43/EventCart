{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4"><br>
      <h3 class="mb-3"><strong style="color: #6052d8;"> <center>Welcome back </center></strong></h3>
      {% if messages %}
        <div class="mb-3">
          {% for m in messages %}
            <div class="alert alert-danger">{{ m }}</div>
          {% endfor %}
        </div>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="mb-3"><br>
          <label for="username" class="form-label"><strong style="font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif; font-size: 20px; color: #6052d8;">Username </strong></label><br>
          <input type="text" class="form-control" id="username" name="username" placeholder="Enter Username" required>
        </div>
        <div class="mb-3"><br>
          <label for="password" class="form-label"><strong style="font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif; font-size: 20px; color: #6052d8;">Password</strong></label><br>
          <input type="password" class="form-control" id="password" name="password" placeholder="Enter Password" required>
        </div><br>
        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>
      <center><strong><p class="small-muted mt-3">Don't have an account? <a href="{% url 'user_register' %}">Create New</a></p></strong></center>
    </div>
  </div>
</div>
{% endblock %}
